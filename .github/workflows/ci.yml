name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: |
            server/go.sum
            cli/go.sum
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          install-only: true
      - name: Run Go lint
        run: make lint MODULE=${{ matrix.module }}

  go-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [server, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: |
            server/go.sum
            cli/go.sum
      - uses: pnpm/action-setup@v4
        if: matrix.module == 'server'
        with:
          version: 10.15.0
          package_json_file: web/package.json
      - uses: actions/setup-node@v5
        if: matrix.module == 'server'
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Run server tests with embedded web bundle
        if: matrix.module == 'server'
        run: make test-server-bundle
      - name: Run CLI tests
        if: matrix.module == 'cli'
        run: make test MODULE=${{ matrix.module }}

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          package_json_file: web/package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: make lint MODULE=web
      - run: make test MODULE=web
      - run: make build MODULE=web

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-skill

  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
          cache-dependency-path: |
            server/go.sum
            cli/go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          package_json_file: web/package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: make build
      - run: make test-seed-run
      - run: pnpm --dir web exec playwright install --with-deps chromium
      - run: make test-browser-run
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            web/test-results
            web/playwright-report
          if-no-files-found: ignore
          retention-days: 7
